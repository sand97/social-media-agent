__STACK_NAME___redis:
  image: redis:7-alpine
  command: ["redis-server", "--appendonly", "yes", "--port", "6379"]
  restart: unless-stopped
  volumes:
    - __STACK_NAME___redis:/data
  healthcheck:
    test: ["CMD", "redis-cli", "ping"]
    interval: 10s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private

__STACK_NAME___postgres:
  image: postgres:16-alpine
  restart: unless-stopped
  environment:
    POSTGRES_DB: agent_db
    POSTGRES_USER: agent_user
    POSTGRES_PASSWORD: agent_password
  volumes:
    - __STACK_NAME___postgres:/var/lib/postgresql/data
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_db"]
    interval: 10s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private

__STACK_NAME___qdrant:
  image: qdrant/qdrant:latest
  restart: unless-stopped
  volumes:
    - __STACK_NAME___qdrant:/qdrant/storage
  networks:
    - bedones_private

__STACK_NAME___cropper:
  image: __WHATSAPP_CROPPER_IMAGE__
  restart: unless-stopped
  environment:
    HOST: 0.0.0.0
    PORT: "8011"
    GEMINI_API_KEY: "__GEMINI_API_KEY__"
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8011/health').read()",
      ]
    interval: 20s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private

__STACK_NAME___agent:
  image: __WHATSAPP_AGENT_IMAGE__
  restart: unless-stopped
  depends_on:
    __STACK_NAME___redis:
      condition: service_healthy
    __STACK_NAME___postgres:
      condition: service_healthy
    __STACK_NAME___qdrant:
      condition: service_started
    __STACK_NAME___cropper:
      condition: service_healthy
  environment:
    NODE_ENV: production
    PORT: "__AGENT_PORT__"
    AGENT_TLS_PORT: "__AGENT_PORT__"
    DATABASE_URL: "postgresql://agent_user:agent_password@__STACK_NAME___postgres:5432/agent_db?schema=public"
    REDIS_HOST: __STACK_NAME___redis
    REDIS_PORT: "6379"
    REDIS_URL: redis://__STACK_NAME___redis:6379
    QDRANT_URL: http://__STACK_NAME___qdrant:6333
    QDRANT_HOST: __STACK_NAME___qdrant
    QDRANT_PORT: "6333"
    AGENT_INTERNAL_JWT_SECRET: "__AGENT_INTERNAL_JWT_SECRET__"
    BACKEND_URL: "__BACKEND_URL__"
    BACKEND_INTERNAL_URL: "__BACKEND_INTERNAL_URL__"
    CONNECTOR_URL: http://__STACK_NAME___connector:__CONNECTOR_PORT__
    IMAGE_CROPPER_URL: http://__STACK_NAME___cropper:8011
    MINIO_ENDPOINT: "__MINIO_ENDPOINT__"
    MINIO_PORT: "__MINIO_PORT__"
    MINIO_USE_SSL: "__MINIO_USE_SSL__"
    MINIO_ACCESS_KEY: "__MINIO_ACCESS_KEY__"
    MINIO_SECRET_KEY: "__MINIO_SECRET_KEY__"
    MINIO_BUCKET: "__MINIO_BUCKET__"
    GEMINI_API_KEY: "__GEMINI_API_KEY__"
    GEMINI_MODEL: "__GEMINI_MODEL__"
    XAI_API_KEY: "__XAI_API_KEY__"
    XAI_MODEL: "__XAI_MODEL__"
    PRIMARY_MODEL: "__PRIMARY_MODEL__"
    FALLBACK_MODEL: "__FALLBACK_MODEL__"
    MTLS_CLIENT_CERT: /certs/client.crt
    MTLS_CLIENT_KEY: /certs/client.key
    SERVICE_NAME: __STACK_LABEL__
    STEP_CA_ROOT_CERT: /certs/root_ca.crt
  command:
    - /bin/sh
    - -c
    - |
      attempts=0
      until pnpm exec prisma migrate deploy; do
        attempts=$$((attempts + 1))
        if [ "$${attempts}" -ge 20 ]; then
          echo "Prisma migrate deploy failed after $${attempts} attempts"
          exit 1
        fi
        echo "Waiting for PostgreSQL migrations to succeed..."
        sleep 5
      done
      exec node dist/main
  volumes:
    - ./certs/__STACK_NAME___agent/client.crt:/certs/client.crt:ro
    - ./certs/__STACK_NAME___agent/client.key:/certs/client.key:ro
    - ./certs/shared/root_ca.crt:/certs/root_ca.crt:ro
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:__AGENT_PORT__/health"]
    interval: 20s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private

__STACK_NAME___connector:
  image: __WHATSAPP_CONNECTOR_IMAGE__
  restart: unless-stopped
  depends_on:
    __STACK_NAME___agent:
      condition: service_healthy
  environment:
    NODE_ENV: production
    PORT: "__CONNECTOR_PORT__"
    BACKEND_URL: "__BACKEND_URL__"
    BACKEND_INTERNAL_URL: "__BACKEND_INTERNAL_URL__"
    CONNECTOR_TLS_PORT: "__CONNECTOR_PORT__"
    WEBHOOK_URLS: "__BACKEND_INTERNAL_URL__/webhooks/whatsapp/events,__BACKEND_INTERNAL_URL__/webhooks/whatsapp/connected"
    CONNECTOR_SECRET: "__CONNECTOR_SECRET__"
    CONNECTOR_INSTANCE_ID: "__STACK_LABEL__"
    MTLS_CLIENT_CERT: /certs/client.crt
    MTLS_CLIENT_KEY: /certs/client.key
    WHATSAPP_AUTOSTART: "__WHATSAPP_AUTOSTART__"
    WHATSAPP_SESSION_PATH: /data/sessions
    WHATSAPP_PUPPETEER_HEADLESS: "true"
    PUPPETEER_EXECUTABLE_PATH: "__PUPPETEER_EXECUTABLE_PATH__"
    STEP_CA_ROOT_CERT: /certs/root_ca.crt
  volumes:
    - __STACK_NAME___connector:/data
    - ./certs/__STACK_NAME___connector/client.crt:/certs/client.crt:ro
    - ./certs/__STACK_NAME___connector/client.key:/certs/client.key:ro
    - ./certs/shared/root_ca.crt:/certs/root_ca.crt:ro
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:__CONNECTOR_PORT__/health"]
    interval: 20s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private

__STACK_NAME___edge:
  image: caddy:2.9-alpine
  restart: unless-stopped
  depends_on:
    __STACK_NAME___agent:
      condition: service_healthy
    __STACK_NAME___connector:
      condition: service_healthy
  ports:
    - "__AGENT_PORT__:__AGENT_PORT__"
    - "__CONNECTOR_PORT__:__CONNECTOR_PORT__"
  volumes:
    - ./caddy/__STACK_NAME__.Caddyfile:/etc/caddy/Caddyfile:ro
    - ./certs/shared/server.crt:/certs/server.crt:ro
    - ./certs/shared/server.key:/certs/server.key:ro
    - ./certs/shared/root_ca.crt:/certs/root_ca.crt:ro
  healthcheck:
    test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
    interval: 20s
    timeout: 5s
    retries: 10
  networks:
    - bedones_private
