name: Install Bedones WhatsApp Agent

on:
  workflow_dispatch:
    inputs:
      workflow_record_id:
        description: Backend workflow record id
        required: true
        type: string
      server_record_id:
        description: Backend server record id
        required: true
        type: string
      server_name:
        description: Hetzner server name
        required: true
        type: string
      provider_server_id:
        description: Hetzner server id
        required: false
        default: ""
        type: string
      server_type:
        description: Hetzner server type
        required: false
        default: cpx22
        type: string
      location:
        description: Hetzner location
        required: false
        default: nbg1
        type: string
      public_ipv4:
        description: Public IPv4 of the existing VPS
        required: true
        type: string
      private_ipv4:
        description: Optional private IPv4 of the existing VPS
        required: false
        default: ""
        type: string
      stacks_per_vps:
        description: Number of stacks to deploy
        required: false
        default: "2"
        type: string
      requested_phone_number:
        description: Optional end-user phone number
        required: false
        default: ""
        type: string
      target_device_type:
        description: mobile or desktop
        required: false
        default: ""
        type: string
      backend_callback_url:
        description: Backend callback endpoint
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  install:
    runs-on:
      - self-hosted
      - linux
      - x64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure runner dependencies
        shell: bash
        run: bash .github/scripts/ensure-provisioning-runner-deps.sh

      - name: Install stack on existing VPS
        id: install
        shell: bash
        env:
          AGENT_INTERNAL_JWT_SECRET: ${{ secrets.AGENT_INTERNAL_JWT_SECRET }}
          BACKEND_CALLBACK_URL: ${{ inputs.backend_callback_url }}
          BACKEND_INTERNAL_URL: ${{ vars.BACKEND_INTERNAL_URL }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          CONNECTOR_SECRET: ${{ secrets.CONNECTOR_SECRET }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GHCR_READ_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          HETZNER_SSH_PRIVATE_KEY: ${{ secrets.HETZNER_SSH_PRIVATE_KEY }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_BUCKET: ${{ vars.MINIO_BUCKET }}
          MINIO_ENDPOINT: ${{ vars.MINIO_ENDPOINT }}
          MINIO_PORT: ${{ vars.MINIO_PORT }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_USE_SSL: ${{ vars.MINIO_USE_SSL }}
          PRIMARY_MODEL: ${{ vars.PRIMARY_MODEL }}
          PRIVATE_IPV4: ${{ inputs.private_ipv4 }}
          PROVIDER_SERVER_ID: ${{ inputs.provider_server_id }}
          PUBLIC_IPV4: ${{ inputs.public_ipv4 }}
          PUPPETEER_EXECUTABLE_PATH: ${{ vars.PUPPETEER_EXECUTABLE_PATH }}
          RENDERED_STACK_FILE: ${{ runner.temp }}/bedones-whatsapp-agent-stack.yml
          SERVER_LOCATION: ${{ inputs.location }}
          SERVER_NAME: ${{ inputs.server_name }}
          SERVER_RECORD_ID: ${{ inputs.server_record_id }}
          SERVER_TYPE: ${{ inputs.server_type }}
          STACK_INFRA_CALLBACK_SECRET: ${{ secrets.STACK_INFRA_CALLBACK_SECRET }}
          STACKS_PER_VPS: ${{ inputs.stacks_per_vps }}
          CLOUDFLARE_ORIGIN_CERT: ${{ secrets.CLOUDFLARE_ORIGIN_CERTIFICATE }}
          CLOUDFLARE_ORIGIN_KEY: ${{ secrets.CLOUDFLARE_PRIVATE_KEY }}
          WHATSAPP_AGENT_IMAGE: ${{ vars.WHATSAPP_AGENT_IMAGE }}
          WHATSAPP_AUTOSTART_TARGET_SLOT: 0
          WHATSAPP_CROPPER_IMAGE: ${{ vars.WHATSAPP_CROPPER_IMAGE }}
          WHATSAPP_CONNECTOR_IMAGE: ${{ vars.WHATSAPP_CONNECTOR_IMAGE }}
          WORKFLOW_RECORD_ID: ${{ inputs.workflow_record_id }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XAI_MODEL: ${{ vars.XAI_MODEL }}
        run: bash .github/scripts/install-bedones-whatsapp-agent-vps.sh

      - name: Notify backend on failure
        if: always() && !cancelled() && steps.install.outcome == 'failure'
        shell: bash
        env:
          BACKEND_CALLBACK_URL: ${{ inputs.backend_callback_url }}
          STACK_INFRA_CALLBACK_SECRET: ${{ secrets.STACK_INFRA_CALLBACK_SECRET }}
          WORKFLOW_RECORD_ID: ${{ inputs.workflow_record_id }}
          SERVER_NAME: ${{ inputs.server_name }}
          SERVER_TYPE: ${{ inputs.server_type }}
          SERVER_LOCATION: ${{ inputs.location }}
          PROVIDER_SERVER_ID: ${{ inputs.provider_server_id }}
          PUBLIC_IPV4: ${{ inputs.public_ipv4 }}
          PRIVATE_IPV4: ${{ inputs.private_ipv4 }}
        run: |
          payload="$(jq -n \
            --arg workflowId "${WORKFLOW_RECORD_ID}" \
            --arg errorMessage "Install workflow failed for server ${SERVER_NAME}" \
            --arg providerServerId "${PROVIDER_SERVER_ID}" \
            --arg publicIpv4 "${PUBLIC_IPV4}" \
            --arg privateIpv4 "${PRIVATE_IPV4:-}" \
            --arg name "${SERVER_NAME}" \
            --arg serverType "${SERVER_TYPE}" \
            --arg location "${SERVER_LOCATION}" \
            '{
              "workflowId": $workflowId,
              "status": "failed",
              "stage": "STACK_INSTALLING",
              "totalJobs": 3,
              "completedJobs": 0,
              "errorMessage": $errorMessage,
              "server": {
                "providerServerId": $providerServerId,
                "publicIpv4": $publicIpv4,
                "privateIpv4": $privateIpv4,
                "name": $name,
                "serverType": $serverType,
                "location": $location
              }
            }')"

          echo "Sending failure callback to ${BACKEND_CALLBACK_URL}"
          echo "Payload: ${payload}"

          curl -sS -X POST "${BACKEND_CALLBACK_URL}" \
            -H "Content-Type: application/json" \
            -H "x-infra-callback-secret: ${STACK_INFRA_CALLBACK_SECRET}" \
            --data-binary "${payload}" || echo "WARNING: failure callback to backend failed"

