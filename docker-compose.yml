services:

  # Backend Service
  backend:
    container_name: apps-backend
    build:
      context: . # Build from monorepo root
      dockerfile: apps/backend/Dockerfile
      target: development # Use development stage
    restart: unless-stopped
    ports:
      - "3005:3000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      database:
        condition: service_healthy
      wppconnect-server:
        condition: service_started
      whatsapp-agent:
        condition: service_started
    volumes:
      - .:/app # Bind-mount monorepo into container
      - /app/node_modules # Anonymous volume for root node_modules
      - /app/apps/backend/node_modules # Anonymous volume for backend node_modules
      - /app/packages/common/node_modules # Anonymous volume for common node_modules
    networks:
      - webnet

  # WPPConnect Server (replaces whatsapp-connector)
  wppconnect-server:
    container_name: apps-wppconnect-server
    build:
      context: .gemini/tmp/wppconnect-server-src # Build from the cloned source
      dockerfile: Dockerfile # Dockerfile is now directly in the context
    image: wppconnect-server-custom:latest # Tag the custom image # Use the official WPPConnect Server image
    restart: unless-stopped
    ports:
      - "3001:3001" # Expose WPPConnect Server API
    env_file:
      - ./.env.wppconnect-server # Use a new .env for WPPConnect Server
    environment:
      WPPCONNECT_WEBHOOK_URL: http://whatsapp-agent:3002/webhook/message # Webhook to whatsapp-agent
      WPPCONNECT_SECRET_KEY: your-wppconnect-secret-key # IMPORTANT: Change this in production
      WPPCONNECT_SESSION_PATH: /app/data/sessions
    volumes:
      - wppconnect_session_data:/app/data/sessions # Persist session data
    networks:
      - webnet

  # WhatsApp Agent Service
  whatsapp-agent:
    container_name: apps-whatsapp-agent
    build:
      context: . # Build from monorepo root
      dockerfile: apps/whatsapp-agent/Dockerfile
      target: development # Use development stage
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - ./apps/whatsapp-agent/.env
    environment:
      CONNECTOR_URL: http://wppconnect-server:3001 # Agent talks to WPPConnect Server
      BACKEND_URL: http://backend:3000 # Agent talks to backend
    depends_on:
      wppconnect-server:
        condition: service_started
    volumes:
      - .:/app # Bind-mount monorepo into container
      - /app/node_modules # Anonymous volume for root node_modules
      - /app/apps/whatsapp-agent/node_modules # Anonymous volume for agent node_modules
      - /app/packages/common/node_modules # Anonymous volume for common node_modules
    networks:
      - webnet

  database:
    container_name: apps-postgres
    image: postgres:12
    ports:
      - 5432:5432
    env_file:
      - ./apps/backend/.env
    networks:
      - webnet
    environment:
      PG_DATA: /var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -d app_db -U app_user" ]
      interval: 10s
      timeout: 5s
      retries: 5
    #    ports:
    #      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - database_data:/var/lib/postgresql/data

  redis:
    container_name: apps-redis
    image: redis:5
    env_file:
      - ./apps/backend/.env
    command: [ "redis-server", "--bind", "redis", "--port", "6379" ]
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -h redis ping | grep 'PONG' || exit 1" ]
      interval: 10s
      timeout: 30s
      retries: 5
    volumes:
      - redis_data:/var/lib/redis
    networks:
      - webnet


networks:
  webnet:

volumes:
  database_data:
  redis_data:
  wppconnect_session_data: # New volume for WPPConnect Server session data
